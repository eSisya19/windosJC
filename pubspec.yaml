name: webshell_app
description: A Flutter WebView shell with download and upload support.
publish_to: 'none'
version: 1.8.8+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # WebView
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.10.13
  webview_windows: ^0.2.2

  # File upload picker
  file_picker: ^8.1.2

  # Permissions (storage, etc.)
  permission_handler: ^11.3.1

  # Download: HTTP client
  http: ^1.2.1

  # Download: storage paths
  path_provider: ^2.1.3

  # Open downloaded file
  open_file: ^3.3.2

  # App version info
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "/Users/lbs/Coding_Projects/app maker/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
